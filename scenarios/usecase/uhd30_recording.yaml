# UHD30 Video Recording — L0 + L1 (hand-authored)
# Steady-state only. Startup/Transition phase is out of scope.
#
# L2 (IP Activity) → scenarios/traces/uhd30_recording/l2_ip_activity.yaml
# L3 (Bus/Memory)  → scenarios/traces/uhd30_recording/l3_bus_memory.yaml
#
# Layer stack (y-axis, top to bottom):
#   app       → CameraApp (Camera2 client)
#   framework → CameraService, MediaCodec FW, SurfaceFlinger
#   hal       → CameraHAL3, Codec2 HAL
#   kernel    → V4L2 driver, MFC kernel driver, DRM/KMS, Storage I/O
#   hw        → ISP, MFC, DPU  (on-SoC HW IPs)
#   memory    → DMA-buf shared buffers between HW IPs
#
# Edge roles:
#   data:    buffer DMA transfer between HW IPs (solid line)
#   control: SW drives HW — V4L2 ioctl / Codec2 / DRM atomic commit (dotted purple)

scenario:
  category: video_recording
  name: UHD30 Video Recording
  version: "0.3"
  description: >
    Android camera pipeline recording UHD (3840×2160) video at 30 fps.
    The ISP processes RAW sensor data via an M2M path (2-frame latency) and
    fans out to two paths: an encode path (ISP→enc_buf→MFC→bitstream→storage)
    and a preview path (ISP→preview_buf→DPU→display). CameraApp UI (viewfinder
    overlay, shutter button) is GPU-composited (ARGB8888 1920×1080) into a
    separate ui_buf, blended by DPU as a second HW overlay plane on top of the
    preview. SW control: CameraApp → Camera2 API → CameraHAL3 → V4L2 Driver → ISP;
    Encode: MediaCodec FW → Codec2 HAL → MFC Driver → MFC;
    Display: SurfaceFlinger → DRM/KMS → DPU.
  sw_thread: hal_kernel
  output_period_ms: 33.3      # 30fps — SW+HW combined output within this period
  budget_ms: 30.0
  pipeline_latency_frames: 2  # ISP M2M path (attribute only — not transition phase)
  risks:
    - severity: medium
      description: "ISP M2M 2-frame latency: budget may be exceeded under memory pressure"
    - severity: low
      description: "GPU composition fallback (if DPU overlay unavailable) adds BW contention"
  _review_flags: []

pipeline:
  nodes:
    # ── External (off-SoC) ─────────────────────────────────────────────────────
    - id: sensor
      type: hw_ip
      label: Camera Sensor
      layer: hw
      external: true
      comment: "CMOS image sensor — RAW10/12 output via CSI-2"

    - id: display
      type: hw_ip
      label: Display Panel
      layer: hw
      external: true
      comment: "Display panel driven via DSI/eDP from DPU"

    # ── App layer ─────────────────────────────────────────────────────────────
    - id: camera_app
      type: sw_task
      label: CameraApp
      layer: app
      sw_thread: app
      comment: "Submits CaptureRequest via Camera2 API; receives JPEG/NV21 callback"

    # ── Framework layer ───────────────────────────────────────────────────────
    - id: camera2_api
      type: sw_task
      label: Camera2 API
      layer: framework
      sw_thread: framework
      comment: "CameraService: routes requests to HAL; manages capture session & surface targets"

    - id: mediacodec
      type: sw_task
      label: MediaCodec FW
      layer: framework
      sw_thread: framework
      comment: "Codec2 framework: queues input buffers to HAL; dequeues encoded output"

    - id: surfaceflinger
      type: sw_task
      label: SurfaceFlinger
      layer: framework
      sw_thread: framework
      comment: "Receives preview Surface from Camera2; decides HW overlay vs GPU composition"

    # ── HAL layer ─────────────────────────────────────────────────────────────
    - id: camera_hal
      type: sw_task
      label: CameraHAL3
      layer: hal
      sw_thread: hal_kernel
      comment: "Configures ISP pipeline via V4L2 ioctl; handles frame-done IRQ callback"

    - id: codec_hal
      type: sw_task
      label: Codec2 HAL
      layer: hal
      sw_thread: hal_kernel
      comment: "Controls MFC via kernel driver; maps DMA-buf; signals encode-done to framework"

    # ── Kernel layer ──────────────────────────────────────────────────────────
    - id: v4l2_driver
      type: sw_task
      label: V4L2 Driver
      layer: kernel
      sw_thread: hal_kernel
      comment: "Kernel V4L2 M2M driver for ISP: VIDIOC_QBUF / VIDIOC_STREAMON; issues DMA to ISP"

    - id: mfc_driver
      type: sw_task
      label: MFC Driver
      layer: kernel
      sw_thread: hal_kernel
      comment: "Kernel MFC driver: maps DMA-buf FDs to IOVA; programs MFC HW registers"

    - id: drm_kms
      type: sw_task
      label: DRM / KMS
      layer: kernel
      sw_thread: hal_kernel
      comment: "SurfaceFlinger calls drmModeAtomicCommit(); DRM/KMS programs DPU overlay plane registers"

    - id: storage_write
      type: sw_task
      label: Storage Write
      layer: kernel
      sw_thread: hal_kernel
      comment: "MediaMuxer writes encoded bitstream to file via VFS/block layer"

    # ── HW layer: on-SoC ──────────────────────────────────────────────────────
    - id: gpu
      type: hw_ip
      label: GPU
      layer: hw
      comment: "GPU composes CameraApp UI surfaces (viewfinder overlay, shutter button) via GLES; outputs ARGB8888 to ui_buf"

    - id: isp
      type: hw_ip
      label: ISP_0
      layer: hw
      comment: "Single ISP (M2M path). Dual-ISP is a separate scenario. Processes RAW→NV12/P010."

    - id: mfc
      type: hw_ip
      label: MFC (H.265)
      layer: hw
      comment: "Multi-Format Codec — H.265 default. AV1 is a variant (same topology, different freq)."

    - id: dpu
      type: hw_ip
      label: DPU
      layer: hw
      rotation: true
      comment: "Display Processing Unit — HW overlay path. Rotation enabled (portrait recording). GPU composition is the risk variant."

    # ── Memory / Buffer layer ──────────────────────────────────────────────────
    - id: ui_buf
      type: buffer
      label: "UI Buffer\nARGB8888 · 1920×1080"
      layer: memory
      compression: false
      llc: true
      comment: "GPU output: CameraApp UI layer (viewfinder overlay). ARGB8888 uncompressed. LLC-backed — DPU reads each scanout from LLC."

    - id: enc_buf
      type: buffer
      label: "Encode Buffer\nNV12 · 3840×2160"
      layer: memory
      compression: false
      llc: false
      comment: "ISP M2M output → MFC. No compression (MFC requires raw NV12). No LLC (streaming write, sequential)."

    - id: preview_buf
      type: buffer
      label: "Preview Buffer\nNV12 · 1920×1080"
      layer: memory
      compression: true
      llc: true
      comment: "ISP preview output → DPU. AFBC compressed (reduces BW ~40%). LLC enabled (DPU reads repeatedly per scanout)."

    - id: bitstream
      type: buffer
      label: "Encoded Bitstream\n(H.265 / AV1)"
      layer: memory
      compression: false
      llc: false
      comment: "MFC output → MediaMuxer file write. Compressed bitstream (codec-level, not memory compression). No LLC (sequential file write)."

  edges:
    # ══ SW control stack: camera capture path ════════════════════════════════
    - id: e_app_cam2
      source: camera_app
      target: camera2_api
      role: control

    - id: e_cam2_hal
      source: camera2_api
      target: camera_hal
      role: control
      branch_condition: "CaptureRequest dispatch"

    - id: e_hal_v4l2
      source: camera_hal
      target: v4l2_driver
      role: control
      branch_condition: "V4L2: VIDIOC_QBUF + STREAMON"

    - id: e_v4l2_isp
      source: v4l2_driver
      target: isp
      role: control
      branch_condition: "DMA address + HW trigger"

    # ── parallel encode path: Camera2 → MediaCodec → Codec2 HAL → MFC driver ─
    - id: e_cam2_mc
      source: camera2_api
      target: mediacodec
      role: control
      branch_condition: "ImageReader callback → encoder surface"

    - id: e_mc_chal
      source: mediacodec
      target: codec_hal
      role: control
      branch_condition: "Codec2: queueInputBuffer"

    - id: e_chal_mfcdrv
      source: codec_hal
      target: mfc_driver
      role: control
      branch_condition: "DMA-buf fd map → IOVA"

    - id: e_mfcdrv_mfc
      source: mfc_driver
      target: mfc
      role: control
      branch_condition: "MFC register write + HW trigger"

    # ── parallel display path: Camera2 → SurfaceFlinger → DRM/KMS → DPU ──────
    - id: e_cam2_sf
      source: camera2_api
      target: surfaceflinger
      role: control
      branch_condition: "Preview Surface → SurfaceFlinger queue"

    - id: e_sf_drm
      source: surfaceflinger
      target: drm_kms
      role: control
      branch_condition: "drmModeAtomicCommit (overlay plane)"

    - id: e_drm_dpu
      source: drm_kms
      target: dpu
      role: control
      branch_condition: "DPU register write: overlay config"

    # ── GPU UI composition path: App + SF → GPU → ui_buf → DPU ──────────────
    - id: e_app_gpu
      source: camera_app
      target: gpu
      role: control
      branch_condition: "GLES draw: viewfinder UI surfaces"

    - id: e_sf_gpu
      source: surfaceflinger
      target: gpu
      role: control
      branch_condition: "GPU composition trigger (HWC decision)"

    # ══ Data path: HW buffer DMA transfers ═══════════════════════════════════
    - id: e_sensor_isp
      source: sensor
      target: isp

    # ISP fan-out: encode path (3840×2160) and preview path (1920×1080)
    - id: e_isp_enc
      source: isp
      target: enc_buf
      format: NV12
      resolution: "3840x2160"
      fps: 30
      fan_out: true

    - id: e_isp_preview
      source: isp
      target: preview_buf
      format: NV12
      resolution: "1920x1080"
      fps: 30

    - id: e_enc_mfc
      source: enc_buf
      target: mfc

    - id: e_mfc_bits
      source: mfc
      target: bitstream

    - id: e_bits_storage
      source: bitstream
      target: storage_write

    - id: e_gpu_ui
      source: gpu
      target: ui_buf
      format: ARGB8888
      resolution: "1920x1080"
      fps: 30

    - id: e_preview_dpu
      source: preview_buf
      target: dpu
      branch_condition: "DPU plane 0: camera preview"

    - id: e_ui_dpu
      source: ui_buf
      target: dpu
      branch_condition: "DPU plane 1: UI overlay (blended in DPU)"

    - id: e_dpu_display
      source: dpu
      target: display
