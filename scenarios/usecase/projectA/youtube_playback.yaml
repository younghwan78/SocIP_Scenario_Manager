scenario:
  category: video_playback
  name: YouTube Playback
  version: "1.0"
  description: >
    YouTube streaming playback on Samsung Galaxy (Exynos).
    ExoPlayer (inside YouTube app) decodes AV1 (UHD/8K) or VP9 (FHD fallback)
    via Exynos MFC. DPU composites video + YouTube UI overlay.
    Network buffer managed by ExoPlayer; only decode-onwards modeled here.
  sw_thread: app
  output_period_ms: 33.3
  budget_ms: 30.0
  pipeline_latency_frames: 1
  risks:
    - severity: medium
      description: "AV1 8K30 decode: near MFC throughput ceiling — thermal throttle risk"
    - severity: low
      description: "Network stall causes ExoPlayer rebuffering — frame drop on DPU output"
  _review_flags: []

pipeline:
  nodes:
    # ── External ──────────────────────────────────────────────────
    - id: network
      type: hw_ip
      layer: hw
      label: "Network\n(YouTube CDN)"
      external: true

    - id: display
      type: hw_ip
      layer: hw
      label: "Display Panel\n(FHD+ DSI)"
      external: true

    # ── App layer ─────────────────────────────────────────────────
    - id: youtube_app
      type: sw_task
      layer: app
      sw_thread: app
      label: "YouTube App\n(ExoPlayer)"

    # ── Framework layer ───────────────────────────────────────────
    - id: exoplayer
      type: sw_task
      layer: framework
      sw_thread: framework
      label: "ExoPlayer\n(MediaCodec wrapper)"

    - id: surfaceflinger
      type: sw_task
      layer: framework
      sw_thread: framework
      label: "SurfaceFlinger"

    # ── HAL layer ─────────────────────────────────────────────────
    - id: codec_hal
      type: sw_task
      layer: hal
      sw_thread: hal_kernel
      label: "Codec2 HAL\n(Exynos MFC HAL)"

    # ── Kernel layer ──────────────────────────────────────────────
    - id: mfc_driver
      type: sw_task
      layer: kernel
      sw_thread: hal_kernel
      label: "MFC Driver\n(Exynos MFC)"

    - id: drm_kms
      type: sw_task
      layer: kernel
      sw_thread: hal_kernel
      label: "DRM / KMS\n(Exynos DECON)"

    # ── HW layer ──────────────────────────────────────────────────
    - id: mfc
      type: hw_ip
      layer: hw
      label: "MFC\n(AV1 / VP9 decode)"

    - id: gpu
      type: hw_ip
      layer: hw
      label: "GPU\n(Xclipse, UI compose)"

    - id: dpu
      type: hw_ip
      layer: hw
      label: "DPU\n(Exynos DECON)"

    # ── Buffer layer ──────────────────────────────────────────────
    - id: stream_buf
      type: buffer
      layer: memory
      label: "Stream Buffer\n(AV1 / VP9 bitstream)"
      compression: false
      llc: false

    - id: decode_buf
      type: buffer
      layer: memory
      label: "Decode Buffer\nNV12 · 1920×1080"
      compression: true
      llc: true

    - id: ui_buf
      type: buffer
      layer: memory
      label: "YouTube UI\nARGB8888 · 1080×2340"
      compression: false
      llc: true

  edges:
    # ── SW Control ────────────────────────────────────────────────
    - {id: e_app_exo,   source: youtube_app,  target: exoplayer,    role: control}
    - {id: e_exo_chal,  source: exoplayer,    target: codec_hal,    role: control}
    - {id: e_chal_mfcd, source: codec_hal,    target: mfc_driver,   role: control}
    - {id: e_mfcd_mfc,  source: mfc_driver,   target: mfc,          role: control}
    - {id: e_app_sf,    source: youtube_app,  target: surfaceflinger, role: control}
    - {id: e_sf_drm,    source: surfaceflinger, target: drm_kms,    role: control}
    - {id: e_drm_dpu,   source: drm_kms,      target: dpu,          role: control}
    - {id: e_sf_gpu,    source: surfaceflinger, target: gpu,        role: control}

    # ── Data ──────────────────────────────────────────────────────
    - {id: e_net_stream,  source: network,    target: stream_buf,
       role: data}
    - {id: e_stream_mfc,  source: stream_buf, target: mfc,
       role: data, format: AV1}
    - {id: e_mfc_decode,  source: mfc,        target: decode_buf,
       role: data, format: NV12, resolution: "1920x1080", fps: 30}
    - {id: e_gpu_ui,      source: gpu,        target: ui_buf,
       role: data, format: ARGB8888, resolution: "1080x2340", fps: 30}
    - {id: e_decode_dpu,  source: decode_buf, target: dpu, role: data}
    - {id: e_ui_dpu,      source: ui_buf,     target: dpu, role: data}
    - {id: e_dpu_display, source: dpu,        target: display, role: data}

variants:
  - id: FHD30
    name: "FHD 30fps VP9 (1920×1080)"
    output_period_ms: 33.3
    budget_ms: 30.0
    buffers:
      decode_buf:
        label: "Decode Buffer\nNV12 · 1920×1080"
      stream_buf:
        label: "Stream Buffer\n(VP9 bitstream)"
    edges:
      e_mfc_decode:
        format: NV12
        resolution: "1920x1080"
        fps: 30
      e_stream_mfc:
        format: VP9
    ip_modes:
      MFC: default
      DPU: default

  - id: UHD30
    name: "UHD 30fps AV1 (3840×2160)"
    output_period_ms: 33.3
    budget_ms: 30.0
    buffers:
      decode_buf:
        label: "Decode Buffer\nNV12 · 3840×2160"
      stream_buf:
        label: "Stream Buffer\n(AV1 bitstream)"
    edges:
      e_mfc_decode:
        format: NV12
        resolution: "3840x2160"
        fps: 30
      e_stream_mfc:
        format: AV1
    ip_modes:
      MFC: AV1_UHD30
      DPU: UHD30

  - id: 8K30
    name: "8K 30fps AV1 (7680×4320)"
    output_period_ms: 33.3
    budget_ms: 28.0
    buffers:
      decode_buf:
        label: "Decode Buffer\nNV12 · 7680×4320"
      stream_buf:
        label: "Stream Buffer\n(AV1 8K bitstream)"
    edges:
      e_mfc_decode:
        format: NV12
        resolution: "7680x4320"
        fps: 30
      e_stream_mfc:
        format: AV1
    ip_modes:
      MFC: AV1_8K30
      DPU: default
